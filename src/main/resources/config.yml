# DCChatBubbles - Configuración

# Tamaño de la burbuja (0.45 = normal, 0.6 = grande, 0.8 = muy grande)
escala: 0.6

# Altura sobre la cabeza del jugador
altura: 2.35

# Segundos que dura la burbuja
duracion: 6

# Máximo de caracteres antes de cortar el mensaje
max_chars: 80

# Ancho de línea en píxeles antes de hacer salto de línea
ancho_linea: 190
